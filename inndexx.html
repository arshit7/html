<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Intelligence Assessment</title>

<style>
    body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(to right, #eef2f3, #dfe9f3);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #2c3e50;
    }

    .question {
        margin-bottom: 18px;
    }

    .question p {
        font-weight: 600;
        margin-bottom: 8px;
    }

    select {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #2c3e50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1a252f;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }

    .low { background: #ffe5e5; color: #c0392b; }
    .medium { background: #fff4cc; color: #b7950b; }
    .high { background: #e8f8f5; color: #1e8449; }
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Emotional Intelligence (EQ) </h1>
    <p><b>Instructions:</b> Select the option that best describes you.</p>

    <div id="quiz"></div>

    <button onclick="calculateScore()">Evaluate My EQ</button>

    <div id="result"></div>
</div>

<script>
const questions = [
" I remain calm and composed under pressure.",
" I can accurately recognize my emotions as they occur.",
" I consider others' perspectives before making decisions.",
" I handle criticism constructively without becoming defensive.",
" I adapt quickly to change and uncertainty.",
" I can control impulsive reactions when emotionally triggered.",
" I effectively resolve conflicts in a respectful manner.",
" I stay motivated even when facing setbacks.",
" I can empathize with others, even if I disagree with them.",
" I build and maintain strong, positive relationships."
];

const quiz = document.getElementById("quiz");

questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
        <p>${i + 1}. ${q}</p>
        <select id="q${i}">
            <option value="1">Strongly Disagree</option>
            <option value="2">Disagree</option>
            <option value="3">Neutral</option>
            <option value="4">Agree</option>
            <option value="5">Strongly Agree</option>
        </select>
    `;

    quiz.appendChild(div);
});

function calculateScore() {
    let total = 0;

    for (let i = 0; i < questions.length; i++) {
        total += parseInt(document.getElementById("q" + i).value);
    }

    let result = document.getElementById("result");
    let message = "";

    if (total <= 25) {
        message = "🔴 Low EQ\nYou may struggle with emotional awareness and regulation. Focus on self-reflection and empathy-building.";
        result.className = "low";
    } else if (total <= 40) {
        message = "🟡 Moderate EQ\nYou demonstrate a fair level of emotional intelligence with room for growth.";
        result.className = "medium";
    } else {
        message = "🟢 High EQ\nYou have strong emotional awareness, empathy, and relationship skills.";
        result.className = "high";
    }

    result.innerText = `Your Score: ${total}/50\n\n${message}`;
}
</script>

</body>
</html>
